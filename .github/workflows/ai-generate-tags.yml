name: AI-Generate JSON Tags for Issues

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC

permissions:
  issues: write
  contents: read

jobs:
  generate-tags:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup GitHub CLI
        run: |
          gh --version
          jq --version
          
          # Create ai-checked label if it doesn't exist
          gh label create ai-checked --color 0E8A16 --description "Issue processed by AI agent for JSON tag generation" || true
      
      - name: Get eligible issues
        id: get_issues
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const oneMonthAgo = new Date();
            oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
            
            // Get all open issues
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            console.log(`Found ${issues.length} open issues`);
            
            // Filter: exclude ai-checked label, created within last month
            const eligibleIssues = [];
            
            for (const issue of issues) {
              // Skip if has ai-checked label
              if (issue.labels.some(label => label.name === 'ai-checked')) {
                console.log(`Issue #${issue.number}: Skipping (has ai-checked label)`);
                continue;
              }
              
              // Skip if older than 1 month
              const createdAt = new Date(issue.created_at);
              if (createdAt < oneMonthAgo) {
                console.log(`Issue #${issue.number}: Skipping (older than 1 month)`);
                continue;
              }
              
              // Check if in project:gbif/23
              try {
                const query = `
                  query($owner: String!, $repo: String!, $issueNumber: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $issueNumber) {
                        projectItems(first: 10) {
                          nodes {
                            project {
                              number
                              owner {
                                ... on Organization {
                                  login
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                
                const result = await github.graphql(query, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issueNumber: issue.number
                });
                
                const projectItems = result.repository.issue.projectItems.nodes;
                const inProject23 = projectItems.some(item => 
                  item.project.owner.login === 'gbif' && item.project.number === 23
                );
                
                if (inProject23) {
                  console.log(`Issue #${issue.number}: Skipping (already in project:gbif/23)`);
                  continue;
                }
              } catch (error) {
                console.log(`Issue #${issue.number}: Could not check project status, including anyway`);
              }
              
              console.log(`Issue #${issue.number}: Eligible for processing`);
              eligibleIssues.push(issue.number);
            }
            
            console.log(`${eligibleIssues.length} eligible issues to process: ${eligibleIssues.join(', ')}`);
            core.setOutput('issues', JSON.stringify(eligibleIssues));
            core.setOutput('count', eligibleIssues.length);
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
      
      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('dplyr', 'purrr', 'httr', 'jsonlite'), repos='https://cloud.r-project.org')"
      
      - name: Install Python dependencies
        run: |
          pip install requests
          cd agent
          pip install -r requirements.txt
      
      - name: Process issues
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GBIF_USER: ${{ secrets.GBIF_USER }}
          GBIF_PWD: ${{ secrets.GBIF_PWD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          # Determine which issues to process
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: process single issue
            ISSUES="[${MANUAL_ISSUE_NUMBER}]"
            echo "Manual run: processing issue #${MANUAL_ISSUE_NUMBER}"
          else
            # Automatic run: process all eligible issues
            ISSUES='${{ steps.get_issues.outputs.issues }}'
            ISSUE_COUNT='${{ steps.get_issues.outputs.count }}'
            echo "Automatic run: processing ${ISSUE_COUNT} issues"
            
            if [ "$ISSUE_COUNT" = "0" ]; then
              echo "No eligible issues to process. Exiting."
              exit 0
            fi
          fi
          
          # Parse issues array and process each one
          echo "$ISSUES" | jq -r '.[]' | while read -r issue_number; do
            echo "================================================"
            echo "Processing issue #${issue_number}"
            echo "================================================"
            
            # Get issue details
            ISSUE_DATA=$(gh api repos/${{ github.repository }}/issues/${issue_number})
            ISSUE_TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
            ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""')
            
            # Check if already has ai-checked label (safety check)
            HAS_LABEL=$(echo "$ISSUE_DATA" | jq -r '.labels[] | select(.name == "ai-checked") | .name')
            if [ -n "$HAS_LABEL" ]; then
              echo "Issue #${issue_number} already has ai-checked label, skipping"
              continue
            fi
            
            # Combine title and body
            FULL_TEXT="${ISSUE_TITLE}"$'\n\n'"${ISSUE_BODY}"
            
            # Generate tags
            cd agent
            RESULT=$(python cli.py "$FULL_TEXT" 2>&1)
            EXIT_CODE=$?
            cd ..
            
            if [ $EXIT_CODE -ne 0 ]; then
              echo "Failed to generate tags for issue #${issue_number}"
              continue
            fi
            
            # Validate JSON
            echo "$RESULT" | python -c "import sys, json; json.loads(sys.stdin.read())" 2>/dev/null
            if [ $? -ne 0 ]; then
              echo "Agent returned invalid JSON for issue #${issue_number}"
              continue
            fi
            
            echo "Generated JSON tags:"
            echo "$RESULT"
            
            # Check COL status
            echo "$RESULT" > /tmp/temp_json.txt
            
            COL_STATUS="UNKNOWN"
            if [ -n "$GBIF_USER" ] && [ -n "$GBIF_PWD" ]; then
              set +e
              R_OUTPUT=$(Rscript process_json.R "/tmp/temp_json.txt" "${issue_number}" 2>&1)
              R_EXIT_CODE=$?
              set -e
              
              if [ $R_EXIT_CODE -eq 0 ]; then
                COL_STATUS=$(echo "$R_OUTPUT" | tail -n 1 | tr -d '\n')
                echo "COL status: $COL_STATUS"
              else
                COL_STATUS="CHECK_FAILED"
                echo "COL check failed"
              fi
            else
              COL_STATUS="CREDENTIALS_MISSING"
            fi
            
            # Prepare status text
            case "$COL_STATUS" in
              "ISSUE_OPEN")
                STATUS_EMOJI="🔴"
                STATUS_TEXT="Open in COL - Issue still exists in Catalogue of Life"
                ;;
              "ISSUE_CLOSED")
                STATUS_EMOJI="✅"
                STATUS_TEXT="Closed in COL - Issue appears to be fixed in Catalogue of Life"
                ;;
              "CREDENTIALS_MISSING")
                STATUS_EMOJI="⚠️"
                STATUS_TEXT="COL check skipped - GBIF credentials not configured"
                ;;
              "CHECK_FAILED")
                STATUS_EMOJI="⚠️"
                STATUS_TEXT="COL status check failed - see workflow logs for details"
                ;;
              *)
                STATUS_EMOJI="⚠️"
                STATUS_TEXT="Status: ${COL_STATUS}"
                ;;
            esac
            
            # Build comment body and save to file
            {
              echo "## 🤖 Proposed JSON Tags"
              echo ""
              echo "// json for auto-checking"
              echo "${RESULT}"
              echo "[why is this here?](https://github.com/gbif/backbone-feedback/wiki/JSON-comments-for-automation-%E2%80%90-Experimental)"
              echo ""
              echo "### ${STATUS_EMOJI} COL Status"
              echo ""
              echo "${STATUS_TEXT}"
              echo ""
              echo "### 📋 Review Actions"
              echo ""
              echo "- [ ] **Accept AI suggestion** (you can edit the JSON here directly or make a new comment)"
              echo "> **⚠️ Disclaimer:** This AI interpretation is provided as a suggestion only and has no effect on what gets changed. All proposed changes must be reviewed and approved by editors before being applied."
            } > /tmp/comment_body.txt
            
            # Post comment
            gh api repos/${{ github.repository }}/issues/${issue_number}/comments \
              -F body=@/tmp/comment_body.txt
            
            # Add ai-checked label
            gh api repos/${{ github.repository }}/issues/${issue_number}/labels \
              -f labels[]='ai-checked'
            
            echo "Successfully processed issue #${issue_number}"
          done
          
          echo "================================================"
          echo "All issues processed"
          echo "================================================"
